name: CLA Assistant

# Migrated to the centralized scitex-ai/.github reusable workflow (2026-07-10
# CI-drift remediation) — job body now delegates to org-level cla.yml so the
# CLA logic stays in one place across the fleet. This repo's allowlist
# includes an extra login (LLEmacs) beyond the reusable workflow's default
# ("bot*,ywatanabe1989"), so it is passed explicitly via `with:`.
# default_branch (main) and owner_login (ywatanabe1989) already match the
# reusable workflow's defaults, so no override needed for those.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
