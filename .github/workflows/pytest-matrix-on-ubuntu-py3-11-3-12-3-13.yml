name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

# Runs on the self-hosted Spartan CPU runner. GitHub label: spartan-cpu
# ("spartan" is meaningful here — it selects this runner over github-hosted;
# only Spartan-side names like the SLURM lease drop the redundant "spartan").
# The runner srun --overlaps an ALREADY-RUNNING lease — never sbatch-and-wait
# (no allocation guarantee). Pending leases are never used.
#
# CI runs INSIDE a reused, pre-built SIF (~/.scitex/dev/containers/ci-cpu.sif,
# on punim0264) — the SIF bakes python3.11/3.12/3.13 + the ecosystem dep set,
# so each run only overlays the editable checkout (PYTHONPATH=src) and runs
# pytest. The SIF IS the cache: no per-run dependency install. Rebuild it with
# `scitex-container apptainer build ci-cpu` when the dependency set changes.
#
# fail-fast / fail-loud / NO silent fallbacks (operator directives 2026-06-16):
# a missing SIF or a missing dep is a hard error, never a reinstall fallback.
jobs:
  test:
    # Job name kept verbatim — these are the required status checks.
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in the reused CI SIF (apptainer exec — no per-run install)
        run: |
          set -euo pipefail
          # The runner's job shell is --noprofile --norc (no Lmod), so put the
          # self-contained apptainer shim on PATH (it execs the real
          # Apptainer/1.3.3 binary directly — no `module`, no login shell,
          # avoiding the bashrc cd/PATH-wipe).
          export PATH="$HOME/.env-3.11/bin:$PATH"
          command -v apptainer >/dev/null || { echo "::error::apptainer shim not on PATH (~/.env-3.11/bin)"; exit 1; }
          IMG="$HOME/.scitex/dev/containers/ci-cpu.sif"
          if [ ! -f "$IMG" ]; then
            echo "::error::CI SIF missing at $IMG — rebuild it: scitex-container apptainer build ci-cpu"
            exit 1
          fi
          V="${{ matrix.python-version }}"
          # apptainer scratch on punim0264 — HOME stays clean.
          export APPTAINER_TMPDIR=/data/gpfs/projects/punim0264/ywatanabe/ci/apptainer-tmp
          mkdir -p "$APPTAINER_TMPDIR"
          # Read-only SIF, NO install (no --writable-tmpfs): the in-container
          # setup — PYTHONPATH=src and the baked venv bin (python3/pytest) on
          # PATH — lives in .github/ci/run-in-sif.sh. Keeping it in a
          # version-controlled script (vs. an inline bash -c) means nothing is
          # written into the SIF and the quoting stays readable.
          # --bind punim0264: $HOME/.scitex is a symlink into punim0264; bind it
          # so the symlink resolves inside the container (else scitex_logging's
          # on-import log-dir mkdir under ~/.scitex fails on a dangling link).
          apptainer exec --pwd "$PWD" --bind /data/gpfs/projects/punim0264 \
            "$IMG" bash .github/ci/run-in-sif.sh "$V"

      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
